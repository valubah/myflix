<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Free Movies Without Ads - TheNkiri, NetNaija, NaijaPrey, FzMovies & O2TvSeries</title>
    <meta name="description"
        content="Download the latest Hollywood, Bollywood, Korean dramas, and TV series in HD quality for free. No ads, no popups, just direct download links from sources like TheNkiri, NetNaija, NaijaPrey, FzMovies, Goojara, and O2TvSeries.">
    <meta name="keywords"
        content="free movies, download free movies, nkiri, theinkiri, thenkiri, fzmovies, o2tvseries, netnaija, thenetnaija, naijaprey, goojara, 123movies, fmovies, skymovieshd, vegamovies, uhdmovies, hdhub4u, hollywood movies download, bollywood movies download, kdrama download, free series download, no ads movies">
    <meta name="robots" content="index, follow">

        content="Download Free Movies Without Ads - TheNkiri, NetNaija, NaijaPrey, FzMovies & O2TvSeries">
    <meta property="og:description"
        content="Download the latest Hollywood, Bollywood, Korean dramas, and TV series in HD quality for free. No ads, no popups, just direct download links.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1200">

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e50914">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/192/2503/2503508.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@300;400;500;700&display=swap');

        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        body {
            background-color: #141414;
            overflow-x: hidden;
        }

        .netflix-gradient {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), rgba(20, 20, 20, 1));
        }

        .movie-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .skeleton {
            animation: skeleton-loading 1s linear infinite alternate;
        }

        @keyframes skeleton-loading {
            0% {
                background-color: hsl(200, 20%, 20%);
            }

            100% {
                background-color: hsl(200, 20%, 30%);
            }
        }

        .hero-banner {
            background: linear-gradient(to right, rgba(0, 0, 0, 0.8), transparent),
                url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1200') center/cover;
            min-height: 70vh;
        }

        .download-btn {
            background: linear-gradient(135deg, #e50914 0%, #b20710 100%);
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #f40612 0%, #e50914 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }
    </style>

<body>
    <div id="root"></div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_URL = window.location.origin + '/api';

        function MovieRow({ title, source, onMovieClick }) {
            const [rowMovies, setRowMovies] = useState([]);
            const [page, setPage] = useState(1);
            const [loading, setLoading] = useState(false);
            const [hasMore, setHasMore] = useState(true);
            const scrollRef = React.useRef(null);

            const fetchRowMovies = async () => {
                if (loading || !hasMore) return;
                setLoading(true);
                try {
                    const response = await fetch(`${API_URL}/movies?source=${source}&page=${page}`);
                    const data = await response.json();
                    if (data.success && data.movies.length > 0) {
                        setRowMovies(prev => {
                            // Deduplicate
                            const existingUrls = new Set(prev.map(m => m.url));
                            const newMovies = data.movies.filter(m => !existingUrls.has(m.url));
                            return [...prev, ...newMovies];
                        });
                        setPage(prev => prev + 1);
                    } else {
                        setHasMore(false);
                    }
                } catch (e) {
                    console.error('Error fetching row movies:', e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchRowMovies();
            }, []);

            const scroll = (direction) => {
                const { current } = scrollRef;
                if (current) {
                    const scrollAmount = direction === 'left' ? -current.offsetWidth * 0.8 : current.offsetWidth * 0.8;
                    current.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
            };

            if (rowMovies.length === 0 && !loading) return null;

            return (
                <div className="mb-10 last:mb-20">
                    <h3 className="text-xl md:text-2xl font-bold mb-4 flex items-center">
                        <span className="w-1 h-8 bg-[#e50914] mr-3 rounded-full"></span>
                        {title}
                        {loading && <div className="ml-4 w-4 h-4 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></div>}
                    </h3>
                    <div className="relative group">
                        <button
                            onClick={() => scroll('left')}
                            className="absolute left-0 top-0 bottom-0 z-20 bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-300 px-3 hover:bg-black/80 flex items-center justify-center"
                        >
                            <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M15 19l-7-7 7-7" /></svg>
                        </button>

                        <div
                            ref={scrollRef}
                            className="flex overflow-x-auto scrollbar-hide space-x-4 pb-6 scroll-smooth"
                        >
                            {rowMovies.map((movie, idx) => (
                                <div
                                    key={idx}
                                    className="flex-none w-36 sm:w-44 md:w-52 cursor-pointer transform transition-transform duration-300 hover:scale-105"
                                    onClick={() => onMovieClick(movie)}
                                >
                                    <div className="relative rounded-lg overflow-hidden bg-gray-800 aspect-[2/3] shadow-lg">
                                        <img
                                            src={movie.image}
                                            alt={movie.title}
                                            className="w-full h-full object-cover"
                                            loading="lazy"
                                            onError={(e) => e.target.src = 'https://via.placeholder.com/200x300/1a1a1a/ffffff?text=No+Image'}
                                        />
                                        <div className="absolute top-2 right-2">
                                            <span className={`text-[8px] font-bold px-1.5 py-0.5 rounded shadow-sm uppercase ${movie.source === 'fzmovies' ? 'bg-[#ff9900] text-black' :
                                                movie.source === 'o2tvseries' ? 'bg-[#007bff] text-white' :
                                                    'bg-black/60 text-white'
                                                }`}>
                                                {movie.source === 'fzmovies' ? 'FzMovies' : movie.source === 'o2tvseries' ? 'O2TV' : ''}
                                            </span>
                                        </div>
                                        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <div className="bg-[#e50914] rounded-full p-3 shadow-xl">
                                                <svg className="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd" /></svg>
                                            </div>
                                        </div>
                                    </div>
                                    <h4 className="mt-3 text-xs md:text-sm font-medium line-clamp-2 text-gray-200 group-hover:text-white">{movie.title}</h4>
                                </div>
                            ))}
                            {hasMore && (
                                <div className="flex-none w-36 sm:w-44 md:w-52 flex items-center justify-center pr-4">
                                    <button
                                        onClick={fetchRowMovies}
                                        className="w-full aspect-[2/3] bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg flex flex-col items-center justify-center text-sm font-bold transition-all group"
                                    >
                                        <div className="mb-2 p-3 rounded-full bg-white/5 group-hover:bg-white/10">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                                        </div>
                                        <span>{loading ? 'Fetching...' : 'View More'}</span>
                                    </button>
                                </div>
                            )}
                        </div>

                        <button
                            onClick={() => scroll('right')}
                            className="absolute right-0 top-0 bottom-0 z-20 bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-300 px-3 hover:bg-black/80 flex items-center justify-center"
                        >
                            <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            const [movies, setMovies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedCategory, setSelectedCategory] = useState('home');
            const [currentPage, setCurrentPage] = useState(1);
            const [siteStats, setSiteStats] = useState({ totalPageViews: 0, uniqueVisitors: 0 });
            const [selectedGenre, setSelectedGenre] = useState('All');
            const [selectedMovie, setSelectedMovie] = useState(null);
            const [movieDetails, setMovieDetails] = useState(null);
            const [loadingDetails, setLoadingDetails] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [searching, setSearching] = useState(false);
            const [error, setError] = useState(null);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstallBanner, setShowInstallBanner] = useState(false);

            const categories = [
                { id: 'home', name: 'Home' },
                { id: 'movies', name: 'Movies' },
                { id: 'kdrama', name: 'K-Drama' },
                { id: 'series', name: 'TV Series' },
                { id: 'nollywood', name: 'Nollywood' },
                { id: 'southafrica', name: 'South Africa' },
                { id: 'adult', name: 'Adult (18+)' },
                { id: 'animation', name: 'Animations' },
                { id: 'korean', name: 'Korean Movies' },
                { id: 'bollywood', name: 'Bollywood' },
            ];

            const genres = ['All', 'Action', 'Comedy', 'Drama', 'Horror', 'Romance', 'Sci-Fi', 'Thriller', 'Crime', 'Animation'];

            useEffect(() => {
                if (selectedCategory !== 'home' || searchQuery) {
                    fetchMovies();
                }
                fetchStats();

                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShowInstallBanner(true);
                });
            }, [selectedCategory, currentPage]);

            const fetchMovies = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`${API_URL}/movies?category=${selectedCategory}&page=${currentPage}`);
                    const data = await response.json();

                    if (data.success) {
                        setMovies(data.movies);
                    } else {
                        setError(`Server Error: ${data.error || 'Failed to fetch movies'}`);
                    }
                } catch (error) {
                    console.error('Error fetching movies:', error);
                    setError('Unable to connect to server. Make sure the backend is running.');
                } finally {
                    setLoading(false);
                }
            };

            const fetchStats = async () => {
                try {
                    const response = await fetch(`${API_URL}/stats`);
                    const data = await response.json();
                    if (data.success) {
                        setSiteStats({
                            totalPageViews: data.totalPageViews,
                            uniqueVisitors: data.uniqueVisitors
                        });
                    }
                } catch (error) {
                    console.error('Error fetching stats:', error);
                }
            };

            const fetchMovieDetails = async (movie) => {
                setLoadingDetails(true);
                setMovieDetails(null);
                try {
                    const source = movie.source || 'thenkiri';
                    const response = await fetch(`${API_URL}/movie/${movie.id}?url=${encodeURIComponent(movie.url)}&source=${source}`);
                    const data = await response.json();

                    if (data.success) {
                        setMovieDetails(data.movie);
                    }
                } catch (error) {
                    console.error('Error fetching movie details:', error);
                } finally {
                    setLoadingDetails(false);
                }
            };

            const handleMovieClick = (movie) => {
                setSelectedMovie(movie);
                fetchMovieDetails(movie);
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;

                setSearching(true);
                setSelectedCategory('search');
                try {
                    const response = await fetch(`${API_URL}/search?q=${encodeURIComponent(searchQuery)}`);
                    const data = await response.json();

                    if (data.success) {
                        setSearchResults(data.movies);
                        setMovies(data.movies);
                    }
                } catch (error) {
                    console.error('Error searching:', error);
                } finally {
                    setSearching(false);
                }
            };

            const handleDownload = async (downloadUrl) => {
                try {
                    const response = await fetch(`${API_URL}/resolve-download?url=${encodeURIComponent(downloadUrl)}`);
                    const data = await response.json();

                    if (data.success && data.directUrl) {
                        window.open(data.directUrl, '_blank');
                    } else {
                        window.open(downloadUrl, '_blank');
                    }
                } catch (error) {
                    console.error('Error resolving download:', error);
                    window.open(downloadUrl, '_blank');
                }
            };

            const filteredMovies = (searchResults.length > 0 ? searchResults : movies).filter(movie => {
                if (selectedGenre === 'All') return true;
                return movie.title.toLowerCase().includes(selectedGenre.toLowerCase());
            });

            const handleInstallClick = () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        setDeferredPrompt(null);
                        setShowInstallBanner(false);
                    });
                }
            };

            return (
                <div className="min-h-screen bg-[#141414] text-white selection:bg-[#e50914] selection:text-white">
                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-50 transition-all duration-300 bg-gradient-to-b from-black to-transparent backdrop-blur-sm bg-black/20">
                        <div className="px-4 md:px-12 py-4 flex items-center justify-between">
                            <div className="flex items-center space-x-8">
                                <h1 className="text-[#e50914] text-3xl font-bold tracking-tight cursor-pointer" onClick={() => window.location.reload()}>
                                    MYFLIX
                                </h1>
                                <div className="hidden md:flex space-x-6">
                                    {categories.slice(0, 6).map(cat => (
                                        <button
                                            key={cat.id}
                                            onClick={() => {
                                                setSelectedCategory(cat.id);
                                                setSearchResults([]);
                                                setSearchQuery('');
                                                setCurrentPage(1);
                                            }}
                                            className={`text-sm tracking-wide transition-all hover:scale-105 ${selectedCategory === cat.id
                                                ? 'text-white font-bold border-b-2 border-[#e50914] pb-1'
                                                : 'text-gray-400 hover:text-gray-200'
                                                }`}
                                        >
                                            {cat.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <form onSubmit={handleSearch} className="flex items-center space-x-4">
                                <input
                                    type="text"
                                    placeholder="Search Title..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="hidden md:block bg-black/40 border border-white/10 rounded-full px-5 py-2 text-sm focus:outline-none focus:border-[#e50914]/50 focus:bg-black/60 transition-all w-64"
                                />
                                <button type="submit" className="hover:scale-110 transition-transform text-white/80 hover:text-white">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </nav>

                    {/* Hero Banner (Only on Home) */}
                    {selectedCategory === 'home' && !searchQuery && (
                        <div className="hero-banner flex items-center px-4 md:px-12 pt-32 pb-20 mb-8">
                            <div className="max-w-3xl">
                                <span className="bg-[#e50914] text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-[0.2em] mb-4 inline-block">Premium Collection</span>
                                <h2 className="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">
                                    Stream & Download <br /> <span className="text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">Without Any Ads</span>
                                </h2>
                                <p className="text-lg md:text-xl mb-8 text-gray-300 max-w-xl">
                                    High-speed direct links from TheNkiri, FzMovies & O2TvSeries. No popups, no redirections. Just pure entertainment.
                                </p>
                                <div className="flex flex-wrap gap-4">
                                    <button
                                        onClick={() => document.querySelector('#movies-section').scrollIntoView({ behavior: 'smooth' })}
                                        className="download-btn text-white px-10 py-4 rounded-full font-bold flex items-center space-x-3 text-lg"
                                    >
                                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd" />
                                        </svg>
                                        <span>Start Watching</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Movies Grid / Rows */}
                    <div id="movies-section" className={`px-4 md:px-12 pb-12 ${selectedCategory !== 'home' || searchQuery ? 'pt-32' : ''}`}>
                        {selectedCategory === 'home' && !searchQuery ? (
                            <div className="space-y-4">
                                <MovieRow title="Latest from Thenkiri" source="thenkiri" onMovieClick={handleMovieClick} />
                                <MovieRow title="FzMovies Collection" source="fzmovies" onMovieClick={handleMovieClick} />
                                <MovieRow title="Adult & Filipino (18+)" source="adult" onMovieClick={handleMovieClick} />
                                <MovieRow title="O2TvSeries Hits" source="o2tvseries" onMovieClick={handleMovieClick} />
                                <MovieRow title="NaijaPrey Originals" source="naijaprey" onMovieClick={handleMovieClick} />
                                <MovieRow title="More from TheNkiri.ng" source="thenkiri.ng" onMovieClick={handleMovieClick} />
                            </div>
                        ) : (
                            <>
                                <div className="flex items-center justify-between mb-8">
                                    <h3 className="text-3xl font-bold">
                                        {searchResults.length > 0
                                            ? `Search: "${searchQuery}"`
                                            : categories.find(c => c.id === selectedCategory)?.name || 'Collection'
                                        }
                                    </h3>
                                    {(searching || loading) && (
                                        <div className="flex items-center space-x-3 text-[#e50914]">
                                            <div className="w-5 h-5 border-2 border-[#e50914] border-t-transparent rounded-full animate-spin"></div>
                                            <span className="text-sm font-medium">Scanning...</span>
                                        </div>
                                    )}
                                </div>

                                {loading ? (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                                        {[...Array(12)].map((_, i) => (
                                            <div key={i} className="skeleton rounded-xl aspect-[2/3]"></div>
                                        ))}
                                    </div>
                                ) : filteredMovies.length === 0 ? (
                                    <div className="text-center py-24 bg-white/5 rounded-3xl border border-white/5">
                                        <svg className="w-20 h-20 mx-auto text-gray-700 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <p className="text-gray-400 text-xl font-medium">We couldn't find any matches.</p>
                                        <button onClick={() => setSelectedCategory('home')} className="mt-6 text-[#e50914] font-bold hover:underline">Return Home</button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                                        {filteredMovies.map((movie, index) => (
                                            <div
                                                key={index}
                                                className="movie-card group relative transform transition-all duration-300 hover:scale-105"
                                                onClick={() => handleMovieClick(movie)}
                                            >
                                                <div className="relative rounded-xl overflow-hidden bg-gray-900 aspect-[2/3] shadow-lg">
                                                    <img
                                                        src={movie.image}
                                                        alt={movie.title}
                                                        className="w-full h-full object-cover"
                                                        loading="lazy"
                                                        onError={(e) => {
                                                            e.target.src = 'https://via.placeholder.com/200x300/1a1a1a/ffffff?text=No+Image';
                                                        }}
                                                    />
                                                    <div className="absolute top-3 right-3">
                                                        <span className={`text-[10px] font-bold px-2 py-1 rounded-md shadow-lg uppercase ${movie.source === 'fzmovies' ? 'bg-[#ff9900] text-black' :
                                                            movie.source === 'o2tvseries' ? 'bg-[#007bff] text-white' :
                                                                movie.source === 'naijaprey' ? 'bg-[#10b981] text-white' :
                                                                    'bg-[#e50914] text-white'
                                                            }`}>
                                                            {movie.source || 'thenkiri'}
                                                        </span>
                                                    </div>
                                                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                        <div className="bg-[#e50914] rounded-full p-4 transform scale-75 group-hover:scale-100 transition-transform">
                                                            <svg className="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20">
                                                                <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd" />
                                                            </svg>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="mt-4">
                                                    <h4 className="text-sm font-bold line-clamp-2 text-gray-200 group-hover:text-white transition-colors">{movie.title}</h4>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Pagination for Categories */}
                                {searchResults.length === 0 && filteredMovies.length > 0 && (
                                    <div className="mt-16 flex justify-center items-center space-x-8">
                                        <button
                                            onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                                            disabled={currentPage === 1}
                                            className={`px-8 py-3 rounded-full font-bold border-2 transition-all ${currentPage === 1 ? 'border-disabled text-gray-700 cursor-not-allowed' : 'border-white/10 text-white hover:bg-white hover:text-black'}`}
                                        >
                                            Previous
                                        </button>
                                        <span className="text-white font-black text-xl">0{currentPage}</span>
                                        <button
                                            onClick={() => setCurrentPage(prev => prev + 1)}
                                            className="px-10 py-3 rounded-full font-bold bg-[#e50914] text-white hover:bg-red-700 transition-shadow hover:shadow-[0_0_20px_rgba(229,9,20,0.4)]"
                                        >
                                            Next Page
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </div>

                    {/* Modal for Movie Details */}
                    {selectedMovie && (
                        <div
                            className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4"
                            onClick={() => {
                                setSelectedMovie(null);
                                setMovieDetails(null);
                            }}
                        >
                            <div className="bg-[#181818] rounded-lg max-w-3xl w-full overflow-hidden max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                                <div className="relative">
                                    <img
                                        src={selectedMovie.image}
                                        alt={selectedMovie.title}
                                        className="w-full h-64 object-cover"
                                    />
                                    <button
                                        onClick={() => {
                                            setSelectedMovie(null);
                                            setMovieDetails(null);
                                        }}
                                        className="absolute top-4 right-4 bg-black/50 rounded-full p-2 hover:bg-black/70"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                <div className="p-8">
                                    {loadingDetails ? (
                                        <div className="space-y-4">
                                            <div className="skeleton h-8 w-3/4 rounded"></div>
                                            <div className="skeleton h-4 w-1/2 rounded"></div>
                                            <div className="skeleton h-24 w-full rounded"></div>
                                            <div className="skeleton h-12 w-full rounded"></div>
                                        </div>
                                    ) : movieDetails ? (
                                        <>
                                            <h2 className="text-3xl font-bold mb-4">{movieDetails.title}</h2>
                                            <div className="flex flex-wrap items-center gap-4 mb-6">
                                                {movieDetails.fileSize && (
                                                    <span className="text-green-400 font-semibold">{movieDetails.fileSize}</span>
                                                )}
                                                {movieDetails.genres && movieDetails.genres.length > 0 && (
                                                    <>
                                                        <span className="text-gray-400">•</span>
                                                        <div className="flex flex-wrap gap-2">
                                                            {movieDetails.genres.map((genre, i) => (
                                                                <span key={i} className="bg-white/10 px-3 py-1 rounded-full text-sm">
                                                                    {genre}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </>
                                                )}
                                            </div>

                                            {movieDetails.synopsis && (
                                                <div className="mb-6">
                                                    <h3 className="text-lg font-semibold mb-2">Synopsis</h3>
                                                    <p className="text-gray-300 text-sm leading-relaxed whitespace-pre-line">{movieDetails.synopsis}</p>
                                                </div>
                                            )}

                                            {movieDetails.trailerUrl && (
                                                <div className="mb-8">
                                                    <h3 className="text-lg font-semibold mb-4">Official Trailer</h3>
                                                    <div className="relative pt-[56.25%] rounded-lg overflow-hidden bg-black shadow-2xl">
                                                        <iframe
                                                            src={movieDetails.trailerUrl}
                                                            className="absolute inset-0 w-full h-full"
                                                            frameBorder="0"
                                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                                            allowFullScreen
                                                        ></iframe>
                                                    </div>
                                                </div>
                                            )}

                                            {movieDetails.downloadLinks && movieDetails.downloadLinks.length > 0 ? (
                                                <div className="space-y-6">
                                                    <div className="flex items-center justify-between mb-3">
                                                        <h3 className="text-lg font-semibold">Download Movies</h3>
                                                        <span className="text-xs text-gray-500">Select quality to start download</span>
                                                    </div>
                                                    {Object.entries(
                                                        movieDetails.downloadLinks.reduce((acc, link) => {
                                                            const group = link.group || 'Movie';
                                                            if (!acc[group]) acc[group] = [];
                                                            acc[group].push(link);
                                                            return acc;
                                                        }, {})
                                                    ).map(([group, links], i) => (
                                                        <div key={i} className="mb-4">
                                                            {group !== 'Movie' && (
                                                                <h4 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 border-l-2 border-[#e50914] pl-2">{group}</h4>
                                                            )}
                                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                                {links.map((link, index) => (
                                                                    <button
                                                                        key={index}
                                                                        onClick={() => handleDownload(link.url)}
                                                                        className="download-btn text-white px-4 py-3 rounded font-semibold flex items-center justify-between group/btn"
                                                                    >
                                                                        <div className="flex items-center space-x-2 overflow-hidden">
                                                                            <svg className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                                                            </svg>
                                                                            <span className="text-xs truncate">{link.text}</span>
                                                                        </div>
                                                                        {link.quality && (
                                                                            <span className="bg-black/40 px-2 py-0.5 rounded text-[10px] ml-2 flex-shrink-0">
                                                                                {link.quality}
                                                                            </span>
                                                                        )}
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="text-center py-10 border border-dashed border-gray-700 rounded-lg">
                                                    <p className="text-gray-500 mb-4">No direct download links found for this title.</p>
                                                    <button
                                                        onClick={() => window.open(movieDetails.url, '_blank')}
                                                        className="bg-white/5 border border-white/10 text-white px-6 py-2 rounded text-sm hover:bg-white/10 transition"
                                                    >
                                                        Visit Source Page
                                                    </button>
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <p className="text-gray-400 text-center py-6">Failed to load movie details</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="border-t border-gray-800 mt-12 py-12 px-4 md:px-12 bg-black/30">
                        <div className="max-w-6xl mx-auto">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8 text-center md:text-left">
                                <div>
                                    <h4 className="text-[#e50914] text-xl font-bold mb-4">THENKIRI</h4>
                                    <p className="text-gray-400 text-sm">Your reliable source for the latest movies and series in high quality.</p>
                                </div>
                                <div className="flex flex-col items-center">
                                    <h4 className="text-white font-semibold mb-4">Site Statistics</h4>
                                    <div className="flex space-x-8">
                                        <div className="text-center">
                                            <p className="text-2xl font-bold text-white">{siteStats.uniqueVisitors.toLocaleString()}</p>
                                            <p className="text-xs text-gray-500 uppercase tracking-widest">Visitors</p>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-2xl font-bold text-white">{siteStats.totalPageViews.toLocaleString()}</p>
                                            <p className="text-xs text-gray-500 uppercase tracking-widest">Page Views</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="md:text-right">
                                    <h4 className="text-white font-semibold mb-4">Legal</h4>
                                    <p className="text-gray-500 text-xs leading-relaxed">
                                        This is a web scraper for archival purposes. All content is hosted on third-party servers.
                                        Always respect local copyright laws.
                                    </p>
                                </div>
                            </div>
                            <div className="text-center text-gray-600 text-[10px] pt-8 border-t border-gray-800/50">
                                <p>© 2025 TheNkiri. All rights reserved. Specialized Scraper Interface V2.0</p>
                            </div>
                        </div>
                    </footer>

                    {/* Mobile Bottom Navigation */}
                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/10 px-6 py-3 flex items-center justify-between z-50 backdrop-blur-md">
                        <button onClick={() => setSelectedCategory('home')} className={`flex flex-col items-center space-y-1 ${selectedCategory === 'home' ? 'text-white' : 'text-gray-500'}`}>
                            <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" /></svg>
                            <span className="text-[10px] uppercase font-bold">Home</span>
                        </button>
                        <button onClick={() => setSelectedCategory('movies')} className={`flex flex-col items-center space-y-1 ${selectedCategory === 'movies' ? 'text-white' : 'text-gray-500'}`}>
                            <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 000-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" /></svg>
                            <span className="text-[10px] uppercase font-bold">Movies</span>
                        </button>
                        <button onClick={() => setSelectedCategory('series')} className={`flex flex-col items-center space-y-1 ${selectedCategory === 'series' ? 'text-white' : 'text-gray-500'}`}>
                            <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" /></svg>
                            <span className="text-[10px] uppercase font-bold">Series</span>
                        </button>
                        <button onClick={() => setSelectedCategory('animation')} className={`flex flex-col items-center space-y-1 ${selectedCategory === 'animation' ? 'text-white' : 'text-gray-500'}`}>
                            <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 100-2 1 1 0 000 2zm7-1a1 1 0 11-2 0 1 1 0 012 0zm-7.535 5.357a1 1 0 011.07-.13l2.465 2.465 2.465-2.465a1 1 0 011.07.13C14.04 13.75 13.56 15 12 15s-2.04-1.25-1.535-1.643z" clipRule="evenodd" /></svg>
                            <span className="text-[10px] uppercase font-bold">Kids</span>
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
